<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#C97B5C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Vibe" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Vibe — play, sing, be the band</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23C97B5C'/><circle cx='16' cy='16' r='7' fill='%23FBF3E8'/><circle cx='16' cy='16' r='2' fill='%233A2418'/></svg>" />

<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Audio + pitch engines (plain JS) -->
<script src="assets/audio.js"></script>
<script src="assets/pitch.js"></script>

<!-- App (JSX) -->
<script type="text/babel" src="assets/icons.jsx"></script>
<script type="text/babel" src="assets/components.jsx"></script>
<script type="text/babel" src="assets/screens.jsx"></script>
<script type="text/babel" src="assets/piano-flute.jsx"></script>
<script type="text/babel" src="assets/other-instruments.jsx"></script>
<script type="text/babel" src="assets/band.jsx"></script>
<script type="text/babel" src="assets/app.jsx"></script>

<!-- SW registration (skipped on sandbox origins where it would fail) -->
<script>
if ('serviceWorker' in navigator && location.protocol !== 'data:' && !location.hostname.endsWith('claudeusercontent.com')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
